name: SociMax
options:
  bundleIdPrefix: com.socimax
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup.git
    from: "2.7.0"

targets:
  SociMax:
    type: application
    platform: macOS
    sources:
      - SociMax
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.socimax.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: SociMax/Info.plist
        CODE_SIGN_ENTITLEMENTS: SociMax/SociMax.entitlements
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
    dependencies:
      - package: SwiftSoup
    entitlements:
      path: SociMax/SociMax.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true

  SociMaxTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - SociMaxTests
    dependencies:
      - target: SociMax
    settings:
      base:
        SWIFT_VERSION: "5.9"
